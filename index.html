<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Geräte-Check</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <h1>Geräte-Check</h1>
  <p>Die Geräteinformationen wurden erfasst.</p>

  <script>
    const daten = {
      userAgent: navigator.userAgent,
      platform: navigator.platform || "Nicht verfügbar",
      language: navigator.language,
      screen: screen.width + "x" + screen.height,
      time: new Date().toLocaleString()
    };

    fetch("https://formspree.io/f/mnjlyqqy", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(daten)
    });
  </script>
</body>
</html>
